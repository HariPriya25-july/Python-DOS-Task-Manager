{% extends "base.html" %}

{% block content %}

<div class="container">

    <h1>Employee Task Manager</h1>
    <h3>Dashboard</h3>

    <div class="top-links">
        <a href="/add_task">Add Task</a>
        <a href="/logout">Logout</a>
    </div>

    <table>
        <tr>
            <th>Title</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>

        {% for task in tasks %}
        <tr>
            <td>{{ task.title }}</td>
            <td>{{ task.status }}</td>
            <td class="actions">
                <a href="/complete/{{ task.id }}" class="complete">Complete</a>
                <a href="/edit/{{ task.id }}" class="edit">Edit</a>
                <a href="/delete/{{ task.id }}" class="delete">Delete</a>
            </td>
        </tr>
        {% endfor %}

    </table>

</div>

{% endblock %}
